name: Release Validation

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version/tag to validate, for example v0.1.30-platform
        required: true
      allow_unreleased_changelog:
        description: Allow candidate validation before CHANGELOG.md is promoted
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate-release:
    name: Validate release candidate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Cache Cargo
        uses: actions/cache@v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-release-validation-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-release-validation-cargo-

      - name: Build release artifact bundle
        env:
          RELEASE_VERSION: ${{ github.event.inputs.version || github.ref_name }}
        run: |
          scripts/build-release-artifacts.py \
            --version "$RELEASE_VERSION" \
            --target x86_64-unknown-linux-gnu \
            --out-dir dist/release

      - name: Check package publication readiness
        run: scripts/check-package-readiness.py --json-out dist/release/package-readiness.json

      - name: Validate release
        env:
          RELEASE_VERSION: ${{ github.event.inputs.version || github.ref_name }}
          ALLOW_UNRELEASED_CHANGELOG: ${{ github.event.inputs.allow_unreleased_changelog || 'false' }}
        run: |
          extra_args=()
          if [ "$ALLOW_UNRELEASED_CHANGELOG" = "true" ]; then
            extra_args+=(--allow-unreleased-changelog)
          fi
          scripts/validate-release.py \
            --version "$RELEASE_VERSION" \
            --artifact-dir dist/release \
            --package-readiness dist/release/package-readiness.json \
            --json-out dist/release/release-validation.json \
            "${extra_args[@]}"

      - name: Upload release validation reports
        uses: actions/upload-artifact@v7.0.1
        with:
          name: permeantos-release-validation-${{ github.event.inputs.version || github.ref_name }}
          path: |
            dist/release/*.tar.gz
            dist/release/checksums.txt
            dist/release/release-manifest.json
            dist/release/package-readiness.json
            dist/release/release-validation.json
          if-no-files-found: error
