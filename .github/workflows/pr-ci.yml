name: PR CI

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt --component clippy
          rustup default stable

      - name: Cache Cargo
        uses: actions/cache@v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: Test workspace
        run: cargo test --locked

  python:
    name: Python tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.11"
          cache: pip

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest jsonschema requests numpy

      - name: Run Python tests
        run: python -m pytest tests

      - name: Run SDK smoke test
        run: python sdk/python/test_sdk.py

      - name: Run AWS E2E preflight smoke test
        env:
          PERMEANT_PREFLIGHT_SKIP_AWS: "1"
          PERMEANT_PREFLIGHT_SKIP_BUILD: "1"
          PERMEANT_PREFLIGHT_SKIP_SOURCE: "1"
        run: scripts/aws-real-runtime-e2e.sh preflight

      - name: Verify public evidence index
        run: scripts/generate-evidence-index.py --json-out /tmp/permeantos-evidence-index.json --markdown-out /tmp/permeantos-evidence-index.md
