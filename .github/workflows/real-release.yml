name: Real Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Product tag to publish, for example v0.1.0
        required: true

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.inputs.version }}
  cancel-in-progress: false

jobs:
  validate-real-release:
    name: Validate real release gate
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Require master
        run: test "${GITHUB_REF_NAME}" = "master"

      - name: Check product version consistency
        env:
          RELEASE_VERSION: ${{ github.event.inputs.version }}
        run: scripts/check-release-version.py --release-version "$RELEASE_VERSION" --release-kind product --json-out dist/real-release/release-version.json

      - name: Build real release plan
        env:
          RELEASE_VERSION: ${{ github.event.inputs.version }}
        run: scripts/plan-real-release.py --release-version "$RELEASE_VERSION" --json-out dist/real-release/real-release-plan.json

      - name: Check real release configuration
        id: release
        env:
          RELEASE_VERSION: ${{ github.event.inputs.version }}
        run: |
          scripts/check-real-release-config.py \
            --release-version "$RELEASE_VERSION" \
            --require github-release \
            --require binaries \
            --require rust \
            --json-out dist/real-release/real-release-config.json
          echo "version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Upload real release gate reports
        uses: actions/upload-artifact@v7.0.1
        with:
          name: permeantos-real-release-gates-${{ github.event.inputs.version }}
          path: dist/real-release
          if-no-files-found: error

  build-linux-artifacts:
    name: Build Linux artifacts
    needs: validate-real-release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Build release artifact bundle
        env:
          RELEASE_VERSION: ${{ needs.validate-real-release.outputs.version }}
        run: |
          scripts/build-release-artifacts.py \
            --version "$RELEASE_VERSION" \
            --target x86_64-unknown-linux-gnu \
            --out-dir dist/release/linux

      - name: Upload Linux release artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: permeantos-real-release-linux-${{ needs.validate-real-release.outputs.version }}
          path: dist/release/linux
          if-no-files-found: error

  build-signed-macos-artifacts:
    name: Build signed and notarized macOS artifacts
    needs: validate-real-release
    runs-on: macos-15
    environment: apple-notarization
    env:
      CODESIGN_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      CODESIGN_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      CODESIGN_IDENTITY: ${{ vars.APPLE_SIGNING_IDENTITY || secrets.APPLE_SIGNING_IDENTITY }}
      CODESIGN_OPTIONS: runtime
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
      APPLE_TEAM_ID: ${{ vars.APPLE_TEAM_ID || secrets.APPLE_TEAM_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Validate Apple signing configuration
        shell: bash
        run: |
          set -euo pipefail
          : "${CODESIGN_CERTIFICATE:?APPLE_CERTIFICATE must be configured}"
          : "${CODESIGN_CERTIFICATE_PASSWORD:?APPLE_CERTIFICATE_PASSWORD must be configured}"
          : "${CODESIGN_IDENTITY:?APPLE_SIGNING_IDENTITY must be configured}"
          : "${APPLE_ID:?APPLE_ID must be configured}"
          : "${APPLE_PASSWORD:?APPLE_PASSWORD must be configured}"
          : "${APPLE_TEAM_ID:?APPLE_TEAM_ID must be configured}"

      - name: Import Apple signing certificate
        shell: bash
        env:
          KEYCHAIN_PASSWORD: ${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          set -euo pipefail
          CERTIFICATE_PATH="$RUNNER_TEMP/permeantos-apple-certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/permeantos-signing.keychain-db"
          echo "$CODESIGN_CERTIFICATE" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$CODESIGN_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Build signed macOS zip artifact
        env:
          RELEASE_VERSION: ${{ needs.validate-real-release.outputs.version }}
        run: |
          scripts/build-release-artifacts.py \
            --version "$RELEASE_VERSION" \
            --target aarch64-apple-darwin \
            --archive-format zip \
            --codesign-identity "$CODESIGN_IDENTITY" \
            --codesign-options "$CODESIGN_OPTIONS" \
            --out-dir dist/release/macos

      - name: Notarize macOS zip artifact
        shell: bash
        run: |
          set -euo pipefail
          archive="$(jq -r '.artifacts[] | select(.target == "aarch64-apple-darwin") | .archive' dist/release/macos/release-manifest.json)"
          test -n "$archive"
          xcrun notarytool submit "dist/release/macos/$archive" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

      - name: Upload macOS release artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: permeantos-real-release-macos-${{ needs.validate-real-release.outputs.version }}
          path: dist/release/macos
          if-no-files-found: error

  publish-rust-crates:
    name: Publish Rust crates
    needs:
      - validate-real-release
      - build-linux-artifacts
      - build-signed-macos-artifacts
    runs-on: ubuntu-latest
    environment: crates-io
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Download real release plan
        uses: actions/download-artifact@v8.0.1
        with:
          name: permeantos-real-release-gates-${{ needs.validate-real-release.outputs.version }}
          path: dist/real-release

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Publish crates to crates.io
        shell: bash
        run: |
          set -euo pipefail
          crate_version="$(jq -r '.product_version' dist/real-release/real-release-plan.json)"
          registry_url="https://crates.io/api/v1/crates"
          registry_user_agent="permeant-os-real-release/${crate_version} (https://github.com/kabudu/permeant-os)"

          crate_already_published() {
            local crate="$1"
            local status
            status="$(curl \
              --silent \
              --location \
              --output /dev/null \
              --write-out "%{http_code}" \
              --user-agent "$registry_user_agent" \
              "${registry_url}/${crate}/${crate_version}" || true)"
            case "$status" in
              200)
                return 0
                ;;
              404)
                return 1
                ;;
              *)
                echo "Unable to confirm crates.io state for $crate $crate_version; registry returned HTTP $status" >&2
                return 1
                ;;
            esac
          }

          publish_attempt() {
            local crate="$1"
            local attempt="$2"
            local log_path="${RUNNER_TEMP:-/tmp}/permeantos-cargo-publish-${crate}-${attempt}.log"
            if cargo publish --locked -p "$crate" 2>&1 | tee "$log_path"; then
              return 0
            fi
            if grep -Eiq "already (uploaded|exists|published)|previously uploaded" "$log_path"; then
              echo "$crate $crate_version was already accepted by crates.io; treating publish as complete"
              return 0
            fi
            return 1
          }

          publish_with_retry() {
            local crate="$1"
            local attempt
            if crate_already_published "$crate"; then
              echo "$crate $crate_version is already published on crates.io; skipping"
              return 0
            fi
            for attempt in 1 2 3 4 5; do
              if cargo publish --locked --dry-run -p "$crate"; then
                break
              fi
              if [ "$attempt" = "5" ]; then
                echo "cargo publish dry-run failed for $crate after $attempt attempts" >&2
                return 1
              fi
              echo "cargo publish dry-run failed for $crate; waiting for registry index propagation before retry $((attempt + 1))" >&2
              sleep 30
            done

            for attempt in 1 2 3 4 5 6; do
              if crate_already_published "$crate"; then
                echo "$crate $crate_version became visible on crates.io; skipping publish retry"
                return 0
              fi
              if publish_attempt "$crate" "$attempt"; then
                sleep 90
                return 0
              fi
              if [ "$attempt" = "6" ]; then
                echo "cargo publish failed for $crate after $attempt attempts" >&2
                return 1
              fi
              echo "cargo publish failed for $crate; waiting before retry $((attempt + 1))" >&2
              sleep 120
            done
          }
          while IFS= read -r crate; do
            test -n "$crate"
            publish_with_retry "$crate"
          done < <(jq -r '.rust.publish_order[]' dist/real-release/real-release-plan.json)

  publish-github-release:
    name: Publish GitHub Release
    needs:
      - validate-real-release
      - build-linux-artifacts
      - build-signed-macos-artifacts
      - publish-rust-crates
    runs-on: ubuntu-latest
    environment: github-release
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Download release artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          pattern: permeantos-real-release-*
          path: artifacts
          merge-multiple: false

      - name: Create GitHub Release
        env:
          RELEASE_VERSION: ${{ needs.validate-real-release.outputs.version }}
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec cp {} release-assets/ \;
          linux_dir="$(find artifacts -type d -name 'permeantos-real-release-linux-*' | head -n 1)"
          macos_dir="$(find artifacts -type d -name 'permeantos-real-release-macos-*' | head -n 1)"
          cp "$linux_dir/checksums.txt" release-assets/checksums-linux.txt
          cp "$linux_dir/release-manifest.json" release-assets/release-manifest-linux.json
          cp "$macos_dir/checksums.txt" release-assets/checksums-macos.txt
          cp "$macos_dir/release-manifest.json" release-assets/release-manifest-macos.json
          python3 - "$RELEASE_VERSION" > release-assets/release-notes.md <<'PY'
          import re
          import sys
          from pathlib import Path

          version = sys.argv[1].removeprefix("v")
          changelog = Path("CHANGELOG.md").read_text(encoding="utf-8").splitlines()
          heading = re.compile(rf"^## \[{re.escape(version)}\] - \d{{4}}-\d{{2}}-\d{{2}}$")
          start = None
          for index, line in enumerate(changelog):
              if heading.match(line):
                  start = index + 1
                  break
          if start is None:
              raise SystemExit(f"CHANGELOG.md does not contain a release section for {version}")
          end = len(changelog)
          for index in range(start, len(changelog)):
              if changelog[index].startswith("## ["):
                  end = index
                  break
          notes = "\n".join(changelog[start:end]).strip()
          if not notes:
              raise SystemExit(f"CHANGELOG.md release section for {version} is empty")
          print(notes)
          PY
          gh release create "$RELEASE_VERSION" \
            --verify-tag \
            --title "PermeantOS $RELEASE_VERSION" \
            --notes-file release-assets/release-notes.md \
            release-assets/*
